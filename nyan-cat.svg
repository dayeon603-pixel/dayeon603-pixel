<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" width="820" height="320">
<defs>
  <clipPath id="clip"><rect width="820" height="320" rx="12"/></clipPath>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#030812"/>
    <stop offset="100%" stop-color="#080f1e"/>
  </linearGradient>
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#060b14" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#060b14" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#060b14" stop-opacity="0.92"/>
  </linearGradient>
  <g id="star">
    <line x1="0" y1="-5" x2="0" y2="5"  stroke="white" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0"  stroke="white" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-3" y1="-3" x2="3" y2="3" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="3" y1="-3" x2="-3" y2="3" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <style>
    .nyan { animation: fly 9s linear infinite; }
    @keyframes fly { from { transform: translateX(-320px); } to { transform: translateX(1140px); } }

    .la { animation: la 0.3s ease-in-out infinite alternate; }
    .lb { animation: lb 0.3s ease-in-out infinite alternate; }
    @keyframes la { from { transform: translateY(0px); } to { transform: translateY(7px); } }
    @keyframes lb { from { transform: translateY(7px); } to { transform: translateY(0px); } }

    .t1{animation:twk 1.8s 0.0s ease-in-out infinite alternate;}
    .t2{animation:twk 2.1s 0.4s ease-in-out infinite alternate;}
    .t3{animation:twk 1.5s 0.8s ease-in-out infinite alternate;}
    .t4{animation:twk 2.3s 0.2s ease-in-out infinite alternate;}
    .t5{animation:twk 1.7s 1.0s ease-in-out infinite alternate;}
    .t6{animation:twk 2.0s 0.6s ease-in-out infinite alternate;}
    .t7{animation:twk 1.6s 0.3s ease-in-out infinite alternate;}
    .t8{animation:twk 2.4s 0.9s ease-in-out infinite alternate;}
    .t9{animation:twk 1.9s 1.3s ease-in-out infinite alternate;}
    @keyframes twk { from { opacity:0.1; } to { opacity:0.9; } }
  </style>
</defs>

<rect width="820" height="320" rx="12" fill="url(#bg)"/>

<g clip-path="url(#clip)">

<!-- Stars -->
<use href="#star" class="t1" transform="translate(45,28)"/>
<use href="#star" class="t2" transform="translate(150,65)"/>
<use href="#star" class="t3" transform="translate(280,22)"/>
<use href="#star" class="t4" transform="translate(400,50)"/>
<use href="#star" class="t5" transform="translate(530,30)"/>
<use href="#star" class="t6" transform="translate(660,60)"/>
<use href="#star" class="t7" transform="translate(760,25)"/>
<use href="#star" class="t8" transform="translate(100,200)"/>
<use href="#star" class="t9" transform="translate(240,230)"/>
<use href="#star" class="t1" transform="translate(370,215)"/>
<use href="#star" class="t3" transform="translate(490,255)"/>
<use href="#star" class="t5" transform="translate(600,195)"/>
<use href="#star" class="t7" transform="translate(720,235)"/>
<use href="#star" class="t2" transform="translate(805,195)"/>
<circle class="t4" cx="75"  cy="130" r="1.3" fill="white"/>
<circle class="t6" cx="195" cy="155" r="1.1" fill="white"/>
<circle class="t8" cx="340" cy="108" r="1.4" fill="white"/>
<circle class="t2" cx="460" cy="170" r="1.2" fill="white"/>
<circle class="t1" cx="590" cy="138" r="1.3" fill="white"/>
<circle class="t9" cx="710" cy="160" r="1.1" fill="white"/>
<circle class="t3" cx="55"  cy="270" r="1.2" fill="white"/>
<circle class="t5" cx="310" cy="285" r="1.0" fill="white"/>
<circle class="t7" cx="550" cy="272" r="1.3" fill="white"/>
<circle class="t4" cx="780" cy="280" r="1.1" fill="white"/>

<!-- ═══════════════════════════════════════════
     NYAN CAT  —  local origin = poptart centre
     Poptart  : x=-42..+42   y=-30..+30
     Head     : x=+42..+96   y=-36..+22
     Legs     : y=+30..+50
     Tail     : hangs off x=-42
     Rainbow  : x=-300..-42  6 stripes ±24 total
     ═══════════════════════════════════════════ -->
<g class="nyan" transform="translate(0,145)">

  <!-- RAINBOW (6 wavy stripes, each 8px tall, stacked -24 to +24) -->

  <!-- Red -->
  <path fill="#ff0000">
    <animate attributeName="d" dur="2.8s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="M-300,-24 C-260,-28 -220,-20 -180,-24 C-140,-28 -100,-20 -60,-24 L-42,-24 L-42,-16 L-60,-16 C-100,-12 -140,-20 -180,-16 C-220,-12 -260,-20 -300,-16 Z;
              M-300,-21 C-260,-25 -220,-17 -180,-21 C-140,-25 -100,-17 -60,-21 L-42,-21 L-42,-13 L-60,-13 C-100,-9  -140,-17 -180,-13 C-220,-9  -260,-17 -300,-13 Z;
              M-300,-24 C-260,-28 -220,-20 -180,-24 C-140,-28 -100,-20 -60,-24 L-42,-24 L-42,-16 L-60,-16 C-100,-12 -140,-20 -180,-16 C-220,-12 -260,-20 -300,-16 Z"/>
  </path>

  <!-- Orange -->
  <path fill="#ff8800">
    <animate attributeName="d" dur="2.8s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="M-300,-16 C-260,-20 -220,-12 -180,-16 C-140,-20 -100,-12 -60,-16 L-42,-16 L-42,-8 L-60,-8  C-100,-4  -140,-12 -180,-8  C-220,-4  -260,-12 -300,-8  Z;
              M-300,-13 C-260,-17 -220,-9  -180,-13 C-140,-17 -100,-9  -60,-13 L-42,-13 L-42,-5  L-60,-5  C-100,-1  -140,-9  -180,-5  C-220,-1  -260,-9  -300,-5  Z;
              M-300,-16 C-260,-20 -220,-12 -180,-16 C-140,-20 -100,-12 -60,-16 L-42,-16 L-42,-8 L-60,-8  C-100,-4  -140,-12 -180,-8  C-220,-4  -260,-12 -300,-8  Z"/>
  </path>

  <!-- Yellow -->
  <path fill="#ffee00">
    <animate attributeName="d" dur="2.8s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="M-300,-8 C-260,-12 -220,-4 -180,-8 C-140,-12 -100,-4 -60,-8 L-42,-8 L-42,0 L-60,0   C-100,4   -140,-4 -180,0   C-220,4   -260,-4 -300,0   Z;
              M-300,-5 C-260,-9  -220,-1 -180,-5 C-140,-9  -100,-1 -60,-5 L-42,-5 L-42,3  L-60,3   C-100,7   -140,-1 -180,3   C-220,7   -260,-1 -300,3   Z;
              M-300,-8 C-260,-12 -220,-4 -180,-8 C-140,-12 -100,-4 -60,-8 L-42,-8 L-42,0 L-60,0   C-100,4   -140,-4 -180,0   C-220,4   -260,-4 -300,0   Z"/>
  </path>

  <!-- Green -->
  <path fill="#33cc33">
    <animate attributeName="d" dur="2.8s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="M-300,0 C-260,-4 -220,4 -180,0 C-140,-4 -100,4 -60,0 L-42,0 L-42,8   L-60,8   C-100,12  -140,4  -180,8   C-220,12  -260,4  -300,8   Z;
              M-300,3 C-260,-1 -220,7 -180,3 C-140,-1 -100,7 -60,3 L-42,3 L-42,11  L-60,11  C-100,15  -140,7  -180,11  C-220,15  -260,7  -300,11  Z;
              M-300,0 C-260,-4 -220,4 -180,0 C-140,-4 -100,4 -60,0 L-42,0 L-42,8   L-60,8   C-100,12  -140,4  -180,8   C-220,12  -260,4  -300,8   Z"/>
  </path>

  <!-- Blue -->
  <path fill="#2288ff">
    <animate attributeName="d" dur="2.8s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="M-300,8  C-260,4  -220,12 -180,8  C-140,4  -100,12 -60,8  L-42,8  L-42,16  L-60,16  C-100,20  -140,12 -180,16  C-220,20  -260,12 -300,16  Z;
              M-300,11 C-260,7  -220,15 -180,11 C-140,7  -100,15 -60,11 L-42,11 L-42,19  L-60,19  C-100,23  -140,15 -180,19  C-220,23  -260,15 -300,19  Z;
              M-300,8  C-260,4  -220,12 -180,8  C-140,4  -100,12 -60,8  L-42,8  L-42,16  L-60,16  C-100,20  -140,12 -180,16  C-220,20  -260,12 -300,16  Z"/>
  </path>

  <!-- Purple -->
  <path fill="#aa00ff">
    <animate attributeName="d" dur="2.8s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="M-300,16 C-260,12 -220,20 -180,16 C-140,12 -100,20 -60,16 L-42,16 L-42,24  L-60,24  C-100,28  -140,20 -180,24  C-220,28  -260,20 -300,24  Z;
              M-300,19 C-260,15 -220,23 -180,19 C-140,15 -100,23 -60,19 L-42,19 L-42,27  L-60,27  C-100,31  -140,23 -180,27  C-220,31  -260,23 -300,27  Z;
              M-300,16 C-260,12 -220,20 -180,16 C-140,12 -100,20 -60,16 L-42,16 L-42,24  L-60,24  C-100,28  -140,20 -180,24  C-220,28  -260,20 -300,24  Z"/>
  </path>

  <!-- TAIL — wag via animateTransform on the path directly -->
  <path d="M-42,-5 Q-66,-8 -68,-26 Q-70,-40 -58,-36 Q-62,-22 -56,-10 Q-48,2 -42,5 Z"
        fill="#999999">
    <animateTransform attributeName="transform" type="rotate"
      values="-15,-42,0; 15,-42,0; -15,-42,0"
      dur="0.55s" repeatCount="indefinite"/>
  </path>

  <!-- POPTART crust -->
  <rect x="-42" y="-30" width="84" height="60" rx="6" fill="#f5c98b"/>
  <!-- POPTART frosting -->
  <rect x="-36" y="-24" width="72" height="48" rx="4" fill="#ff99aa"/>
  <!-- Sprinkles -->
  <rect transform="translate(-20,-12) rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#ff3399"/>
  <rect transform="translate(4,-18)   rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#00ccff"/>
  <rect transform="translate(-8,4)    rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#ffff00"/>
  <rect transform="translate(16,-8)   rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#ff6600"/>
  <rect transform="translate(-28,10)  rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#00ff88"/>
  <rect transform="translate(22,10)   rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#ff33ff"/>
  <rect transform="translate(10,18)   rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#ff3399"/>
  <rect transform="translate(-14,20)  rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#00ccff"/>

  <!-- LEGS — alternating pairs -->
  <g class="la"><rect x="-36" y="30" width="14" height="18" rx="3" fill="#999999"/></g>
  <g class="lb"><rect x="-16" y="30" width="14" height="18" rx="3" fill="#999999"/></g>
  <g class="la"><rect x="5"   y="30" width="14" height="18" rx="3" fill="#999999"/></g>
  <g class="lb"><rect x="25"  y="30" width="14" height="18" rx="3" fill="#999999"/></g>

  <!-- CAT HEAD -->
  <rect x="42" y="-28" width="50" height="52" rx="8" fill="#999999"/>

  <!-- Ears -->
  <polygon points="50,-28 44,-46 64,-28" fill="#999999"/>
  <polygon points="72,-28 78,-46 92,-28" fill="#999999"/>
  <!-- Inner ears -->
  <polygon points="51,-29 46,-43 62,-29" fill="#ff88aa"/>
  <polygon points="73,-29 78,-43 91,-29" fill="#ff88aa"/>

  <!-- Eyes — happy V arcs -->
  <polyline points="50,-12 57,-19 64,-12" fill="none" stroke="#333" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="69,-12 76,-19 83,-12" fill="none" stroke="#333" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Nose -->
  <ellipse cx="78" cy="-2" rx="3.5" ry="2.8" fill="#ff6688"/>

  <!-- Mouth -->
  <polyline points="73,8 78,14 83,8" fill="none" stroke="#444" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Whiskers right -->
  <line x1="83" y1="-5" x2="102" y2="-9"  stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="83" y1="1"  x2="102" y2="1"   stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="83" y1="7"  x2="102" y2="11"  stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="50" y1="-5" x2="31"  y2="-9"  stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="1"  x2="31"  y2="1"   stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="7"  x2="31"  y2="11"  stroke="#666" stroke-width="1.5" stroke-linecap="round"/>

</g>
<!-- /nyan cat -->

<!-- Bottom fade overlay for text legibility -->
<rect width="820" height="320" rx="12" fill="url(#fade)"/>

<!-- Text -->
<text x="32" y="248" font-family="'Courier New',monospace" font-size="12"
      fill="#58a6ff" opacity="0.85" letter-spacing="1">@octocat</text>
<text x="32" y="278" font-family="'Courier New',monospace" font-size="30"
      font-weight="800" fill="#e6edf3">Code. Ship. Repeat.</text>
<circle cx="32"  cy="303" r="4" fill="#58a6ff"/>
<text x="42"  y="307" font-family="'Courier New',monospace" font-size="11" fill="#7d8590">2,847 commits</text>
<circle cx="152" cy="303" r="4" fill="#3fb950"/>
<text x="162" y="307" font-family="'Courier New',monospace" font-size="11" fill="#7d8590">142 PRs merged</text>
<circle cx="282" cy="303" r="4" fill="#d2a8ff"/>
<text x="292" y="307" font-family="'Courier New',monospace" font-size="11" fill="#7d8590">38 repos</text>

<!-- Active badge -->
<rect x="716" y="14" width="90" height="24" rx="12" fill="rgba(35,134,54,0.12)" stroke="#238636" stroke-width="1"/>
<circle cx="730" cy="26" r="4" fill="#3fb950"/>
<text x="738" y="30" font-family="'Courier New',monospace" font-size="11" fill="#3fb950">Active</text>

</g>
</svg>
