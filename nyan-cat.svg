<!--
  ╔══════════════════════════════════════════════════════╗
  ║  NYAN CAT GITHUB PROFILE BANNER                      ║
  ║  Dimensions : 820 × 320 px                           ║
  ╠══════════════════════════════════════════════════════╣
  ║  HOW TO CUSTOMISE                                    ║
  ║  ─────────────────────────────────────────────────── ║
  ║  1. USERNAME   → find "@octocat" (near bottom)       ║
  ║  2. TAGLINE    → find "Code. Ship. Repeat."          ║
  ║  3. SPEED      → change dur="9s" in .nyan keyframe   ║
  ║  4. CAT COLOR  → replace #999999 with any hex color  ║
  ╚══════════════════════════════════════════════════════╝
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 820 320" width="820" height="320">

<defs>
  <clipPath id="clip">
    <rect width="820" height="320" rx="12"/>
  </clipPath>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#030812"/>
    <stop offset="100%" stop-color="#080f1e"/>
  </linearGradient>
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#060b14" stop-opacity="0"/>
    <stop offset="45%"  stop-color="#060b14" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#060b14" stop-opacity="0.94"/>
  </linearGradient>
  <g id="star">
    <line x1="0" y1="-5" x2="0" y2="5"  stroke="white" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0"  stroke="white" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-3" y1="-3" x2="3" y2="3" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="3" y1="-3" x2="-3" y2="3" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <style>
    /* SPEED: change dur value. e.g. "7s"=faster "12s"=slower */
    .nyan { animation: fly 9s linear infinite; }
    @keyframes fly {
      from { transform: translate(-220px, 130px) scale(0.6); }
      to   { transform: translate(1060px, 130px) scale(0.6); }
    }
    .la { animation: la 0.3s ease-in-out infinite alternate; }
    .lb { animation: lb 0.3s ease-in-out infinite alternate; }
    @keyframes la { from { transform: translateY(0px); } to { transform: translateY(7px); } }
    @keyframes lb { from { transform: translateY(7px); } to { transform: translateY(0px); } }
    .t1{animation:twk 1.8s 0.0s ease-in-out infinite alternate;}
    .t2{animation:twk 2.1s 0.4s ease-in-out infinite alternate;}
    .t3{animation:twk 1.5s 0.8s ease-in-out infinite alternate;}
    .t4{animation:twk 2.3s 0.2s ease-in-out infinite alternate;}
    .t5{animation:twk 1.7s 1.0s ease-in-out infinite alternate;}
    .t6{animation:twk 2.0s 0.6s ease-in-out infinite alternate;}
    .t7{animation:twk 1.6s 0.3s ease-in-out infinite alternate;}
    .t8{animation:twk 2.4s 0.9s ease-in-out infinite alternate;}
    .t9{animation:twk 1.9s 1.3s ease-in-out infinite alternate;}
    @keyframes twk { from { opacity:0.1; } to { opacity:0.9; } }
  </style>
</defs>

<rect width="820" height="320" rx="12" fill="url(#bg)"/>

<g clip-path="url(#clip)">

  <!-- STARS -->
  <use href="#star" class="t1" transform="translate(45,28)"/>
  <use href="#star" class="t2" transform="translate(160,62)"/>
  <use href="#star" class="t3" transform="translate(290,20)"/>
  <use href="#star" class="t4" transform="translate(415,48)"/>
  <use href="#star" class="t5" transform="translate(540,28)"/>
  <use href="#star" class="t6" transform="translate(670,58)"/>
  <use href="#star" class="t7" transform="translate(768,22)"/>
  <use href="#star" class="t8" transform="translate(95,175)"/>
  <use href="#star" class="t9" transform="translate(245,195)"/>
  <use href="#star" class="t1" transform="translate(375,188)"/>
  <use href="#star" class="t3" transform="translate(500,210)"/>
  <use href="#star" class="t5" transform="translate(610,172)"/>
  <use href="#star" class="t7" transform="translate(728,200)"/>
  <use href="#star" class="t2" transform="translate(808,178)"/>
  <circle class="t4" cx="72"  cy="100" r="1.3" fill="white"/>
  <circle class="t6" cx="198" cy="125" r="1.1" fill="white"/>
  <circle class="t8" cx="345" cy="90"  r="1.4" fill="white"/>
  <circle class="t2" cx="462" cy="145" r="1.2" fill="white"/>
  <circle class="t1" cx="592" cy="108" r="1.3" fill="white"/>
  <circle class="t9" cx="712" cy="135" r="1.1" fill="white"/>
  <circle class="t3" cx="52"  cy="240" r="1.2" fill="white"/>
  <circle class="t5" cx="315" cy="255" r="1.0" fill="white"/>
  <circle class="t7" cx="552" cy="244" r="1.3" fill="white"/>
  <circle class="t4" cx="782" cy="250" r="1.1" fill="white"/>

  <!-- NYAN CAT — scaled to 0.6x via CSS transform above -->
  <g class="nyan">

    <!-- Rainbow stripes -->
    <path fill="#ff0000">
      <animate attributeName="d" dur="2.8s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
        values="M-300,-24 C-255,-28 -210,-20 -165,-24 C-120,-28 -75,-20 -42,-24 L-42,-16 C-75,-12 -120,-20 -165,-16 C-210,-12 -255,-20 -300,-16 Z;
                M-300,-21 C-255,-25 -210,-17 -165,-21 C-120,-25 -75,-17 -42,-21 L-42,-13 C-75,-9  -120,-17 -165,-13 C-210,-9  -255,-17 -300,-13 Z;
                M-300,-24 C-255,-28 -210,-20 -165,-24 C-120,-28 -75,-20 -42,-24 L-42,-16 C-75,-12 -120,-20 -165,-16 C-210,-12 -255,-20 -300,-16 Z"/>
    </path>
    <path fill="#ff8800">
      <animate attributeName="d" dur="2.8s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
        values="M-300,-16 C-255,-20 -210,-12 -165,-16 C-120,-20 -75,-12 -42,-16 L-42,-8  C-75,-4  -120,-12 -165,-8  C-210,-4  -255,-12 -300,-8  Z;
                M-300,-13 C-255,-17 -210,-9  -165,-13 C-120,-17 -75,-9  -42,-13 L-42,-5  C-75,-1  -120,-9  -165,-5  C-210,-1  -255,-9  -300,-5  Z;
                M-300,-16 C-255,-20 -210,-12 -165,-16 C-120,-20 -75,-12 -42,-16 L-42,-8  C-75,-4  -120,-12 -165,-8  C-210,-4  -255,-12 -300,-8  Z"/>
    </path>
    <path fill="#ffee00">
      <animate attributeName="d" dur="2.8s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
        values="M-300,-8  C-255,-12 -210,-4  -165,-8  C-120,-12 -75,-4  -42,-8  L-42,0   C-75,4   -120,-4  -165,0   C-210,4   -255,-4  -300,0   Z;
                M-300,-5  C-255,-9  -210,-1  -165,-5  C-120,-9  -75,-1  -42,-5  L-42,3   C-75,7   -120,-1  -165,3   C-210,7   -255,-1  -300,3   Z;
                M-300,-8  C-255,-12 -210,-4  -165,-8  C-120,-12 -75,-4  -42,-8  L-42,0   C-75,4   -120,-4  -165,0   C-210,4   -255,-4  -300,0   Z"/>
    </path>
    <path fill="#33cc33">
      <animate attributeName="d" dur="2.8s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
        values="M-300,0   C-255,-4  -210,4   -165,0   C-120,-4  -75,4   -42,0   L-42,8   C-75,12  -120,4   -165,8   C-210,12  -255,4   -300,8   Z;
                M-300,3   C-255,-1  -210,7   -165,3   C-120,-1  -75,7   -42,3   L-42,11  C-75,15  -120,7   -165,11  C-210,15  -255,7   -300,11  Z;
                M-300,0   C-255,-4  -210,4   -165,0   C-120,-4  -75,4   -42,0   L-42,8   C-75,12  -120,4   -165,8   C-210,12  -255,4   -300,8   Z"/>
    </path>
    <path fill="#2288ff">
      <animate attributeName="d" dur="2.8s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
        values="M-300,8   C-255,4   -210,12  -165,8   C-120,4   -75,12  -42,8   L-42,16  C-75,20  -120,12  -165,16  C-210,20  -255,12  -300,16  Z;
                M-300,11  C-255,7   -210,15  -165,11  C-120,7   -75,15  -42,11  L-42,19  C-75,23  -120,15  -165,19  C-210,23  -255,15  -300,19  Z;
                M-300,8   C-255,4   -210,12  -165,8   C-120,4   -75,12  -42,8   L-42,16  C-75,20  -120,12  -165,16  C-210,20  -255,12  -300,16  Z"/>
    </path>
    <path fill="#aa00ff">
      <animate attributeName="d" dur="2.8s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
        values="M-300,16  C-255,12  -210,20  -165,16  C-120,12  -75,20  -42,16  L-42,24  C-75,28  -120,20  -165,24  C-210,28  -255,20  -300,24  Z;
                M-300,19  C-255,15  -210,23  -165,19  C-120,15  -75,23  -42,19  L-42,27  C-75,31  -120,23  -165,27  C-210,31  -255,23  -300,27  Z;
                M-300,16  C-255,12  -210,20  -165,16  C-120,12  -75,20  -42,16  L-42,24  C-75,28  -120,20  -165,24  C-210,28  -255,20  -300,24  Z"/>
    </path>

    <!-- Tail -->
    <path d="M-42,-4 Q-62,-6 -66,-22 Q-70,-36 -60,-32 Q-62,-20 -55,-9 Q-46,4 -42,4 Z" fill="#999999">
      <animateTransform attributeName="transform" type="rotate"
        values="-18,-42,0; 18,-42,0; -18,-42,0" dur="0.55s" repeatCount="indefinite"/>
    </path>

    <!-- Poptart -->
    <rect x="-42" y="-30" width="84" height="60" rx="6" fill="#f5c98b"/>
    <rect x="-36" y="-24" width="72" height="48" rx="4" fill="#ff99aa"/>
    <rect transform="translate(-20,-12) rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#ff3399"/>
    <rect transform="translate(4,-18)   rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#00ccff"/>
    <rect transform="translate(-8,4)    rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#ffff00"/>
    <rect transform="translate(16,-8)   rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#ff6600"/>
    <rect transform="translate(-28,10)  rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#00ff88"/>
    <rect transform="translate(22,10)   rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#ff33ff"/>
    <rect transform="translate(10,18)   rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#ff3399"/>
    <rect transform="translate(-14,20)  rotate(42)" x="-4" y="-1.5" width="9" height="3" rx="1.5" fill="#00ccff"/>

    <!-- Legs -->
    <g class="la"><rect x="-36" y="30" width="14" height="18" rx="3" fill="#999999"/></g>
    <g class="lb"><rect x="-16" y="30" width="14" height="18" rx="3" fill="#999999"/></g>
    <g class="la"><rect x="5"   y="30" width="14" height="18" rx="3" fill="#999999"/></g>
    <g class="lb"><rect x="25"  y="30" width="14" height="18" rx="3" fill="#999999"/></g>

    <!-- Head -->
    <rect x="42" y="-28" width="54" height="52" rx="8" fill="#999999"/>
    <polygon points="50,-28 44,-48 66,-28" fill="#999999"/>
    <polygon points="74,-28 80,-48 96,-28" fill="#999999"/>
    <polygon points="51,-29 47,-44 64,-29" fill="#ff88aa"/>
    <polygon points="75,-29 80,-44 94,-29" fill="#ff88aa"/>
    <polyline points="50,-10 57,-18 64,-10" fill="none" stroke="#333333" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="70,-10 77,-18 84,-10" fill="none" stroke="#333333" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="79" cy="0" rx="3.5" ry="2.8" fill="#ff6688"/>
    <polyline points="74,10 79,16 84,10" fill="none" stroke="#444444" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="84" y1="-4"  x2="104" y2="-8"  stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="84" y1="2"   x2="104" y2="2"   stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="84" y1="8"   x2="104" y2="12"  stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="50" y1="-4"  x2="30"  y2="-8"  stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="50" y1="2"   x2="30"  y2="2"   stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="50" y1="8"   x2="30"  y2="12"  stroke="#666" stroke-width="1.5" stroke-linecap="round"/>

  </g>

  <rect width="820" height="320" rx="12" fill="url(#fade)"/>

  <!-- EDIT BELOW: change @octocat to your username -->
  <text x="32" y="248" font-family="'Courier New',monospace" font-size="12" fill="#58a6ff" opacity="0.85" letter-spacing="1">@octocat</text>
  <!-- EDIT BELOW: change tagline -->
  <text x="32" y="278" font-family="'Courier New',monospace" font-size="30" font-weight="800" fill="#e6edf3">Code. Ship. Repeat.</text>

  <!-- Stats are pulled dynamically via github-readme-stats shields in README.md -->
  <!-- These are static fallback labels shown inside the SVG only -->
  <circle cx="32"  cy="304" r="4" fill="#58a6ff"/>
  <text x="42"  y="308" font-family="'Courier New',monospace" font-size="11" fill="#7d8590">commits</text>
  <circle cx="112" cy="304" r="4" fill="#3fb950"/>
  <text x="122" y="308" font-family="'Courier New',monospace" font-size="11" fill="#7d8590">PRs merged</text>
  <circle cx="220" cy="304" r="4" fill="#d2a8ff"/>
  <text x="230" y="308" font-family="'Courier New',monospace" font-size="11" fill="#7d8590">repos</text>

  <rect x="716" y="14" width="90" height="24" rx="12" fill="rgba(35,134,54,0.12)" stroke="#238636" stroke-width="1"/>
  <circle cx="730" cy="26" r="4" fill="#3fb950"/>
  <text x="738" y="30" font-family="'Courier New',monospace" font-size="11" fill="#3fb950">Active</text>

</g>
</svg>
